<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OIDC Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      padding: 2rem;
      width: 100%;
      max-width: 700px;
    }

    h1 { font-size: 1.5rem; margin-bottom: .25rem; }
    .subtitle { color: #666; font-size: .875rem; margin-bottom: 1.75rem; }
    code { font-family: 'Menlo', 'Consolas', monospace; font-size: .85em;
           background: #f0f0f0; padding: .1em .35em; border-radius: 3px; }

    button {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .55rem 1.4rem; font-size: .95rem;
      border: none; border-radius: 6px; cursor: pointer; font-weight: 500;
      transition: background .15s;
    }
    .btn-primary  { background: #0070f3; color: #fff; }
    .btn-primary:hover  { background: #0059c8; }
    .btn-secondary { background: #eee; color: #333; }
    .btn-secondary:hover { background: #ddd; }

    table {
      width: 100%; border-collapse: collapse;
      margin-top: 1.25rem;
    }
    thead th {
      background: #f7f7f7; text-align: left;
      font-size: .75rem; text-transform: uppercase;
      letter-spacing: .06em; color: #555;
      padding: .6rem 1rem; border-bottom: 2px solid #eee;
    }
    tbody td {
      padding: .65rem 1rem;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
    }
    tbody td:first-child { font-weight: 600; color: #444; width: 140px; }
    pre {
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: .82rem; white-space: pre-wrap; word-break: break-all;
    }

    .actions { margin-top: 1.5rem; display: flex; gap: .75rem; }
    .error {
      color: #c62828; background: #fce8e8;
      padding: .7rem 1rem; border-radius: 6px; margin-top: 1rem;
      font-size: .9rem;
    }
    .status { color: #555; font-style: italic; margin-top: .5rem; }
  </style>
</head>
<body>
  <!-- CONFIG_PLACEHOLDER -->

  <div class="card">
    <h1>OIDC Demo</h1>
    <p class="subtitle">
      Démonstration du flux OAuth 2.0 + PKCE avec
      <code>ioserver-oidc</code> et <code>auth-service</code>.
    </p>
    <div id="app"></div>
  </div>

  <script type="module">
    const { authServiceUrl, appSlug, redirectUri } = window.__CONFIG__;

    // ── Helpers crypto (PKCE) ──────────────────────────────────────────────
    function b64url(buf) {
      return btoa(String.fromCharCode(...new Uint8Array(buf)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }
    async function sha256(str) {
      return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    }
    function randomStr(n) {
      const a = new Uint8Array(n);
      crypto.getRandomValues(a);
      return b64url(a);
    }
    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── PKCE — initiation du flow ──────────────────────────────────────────
    async function login() {
      const verifier   = randomStr(48);
      const challenge  = b64url(await sha256(verifier));
      const state      = randomStr(24);

      sessionStorage.setItem('pkce_verifier', verifier);
      sessionStorage.setItem('pkce_state',    state);

      const params = new URLSearchParams({
        response_type:         'code',
        client_id:             appSlug,
        redirect_uri:          redirectUri,
        scope:                 'openid profile email roles permissions features',
        code_challenge:        challenge,
        code_challenge_method: 'S256',
        state,
      });
      window.location.href = `${authServiceUrl}/api/auth/oauth2/authorize?${params}`;
    }

    // ── PKCE — échange du code (via proxy serveur) ─────────────────────────
    async function exchangeCode(code, state) {
      if (state !== sessionStorage.getItem('pkce_state'))
        throw new Error('Vérification d\'état OAuth échouée (state mismatch).');
      const verifier = sessionStorage.getItem('pkce_verifier');
      if (!verifier) throw new Error('PKCE verifier manquant.');

      const res = await fetch('/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, code_verifier: verifier, redirect_uri: redirectUri }),
      });
      const data = await res.json();
      if (!res.ok)
        throw new Error(data.error_description ?? data.error ?? `HTTP ${res.status}`);

      sessionStorage.removeItem('pkce_verifier');
      sessionStorage.removeItem('pkce_state');
      sessionStorage.setItem('access_token', data.access_token);
      return data.access_token;
    }

    // ── Appel /api/me ──────────────────────────────────────────────────────
    async function fetchProfile(token) {
      const res = await fetch('/api/me', {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) throw new Error(`Profil inaccessible (HTTP ${res.status})`);
      return res.json();
    }

    function logout() {
      sessionStorage.clear();
      history.replaceState({}, '', '/');
      render();
    }

    // ── Rendu ──────────────────────────────────────────────────────────────
    function el() { return document.getElementById('app'); }

    function showLogin(errorMsg) {
      el().innerHTML = `
        <p>Connectez-vous pour accéder à la page de profil protégée.</p>
        <div class="actions">
          <button class="btn-primary" id="btnLogin">Se connecter</button>
        </div>
        ${errorMsg ? `<p class="error">${escHtml(errorMsg)}</p>` : ''}
      `;
      document.getElementById('btnLogin').addEventListener('click', login);
    }

    function showProfile(profile) {
      const rows = [
        ['sub',         profile.sub],
        ['email',       profile.email  ?? '—'],
        ['name',        profile.name   ?? '—'],
        ['roles',       profile.roles.length
                          ? profile.roles.join(', ')
                          : '(aucun)'],
        ['permissions', profile.permissions.length
                          ? profile.permissions.join(', ')
                          : '(aucune)'],
        ['features',    JSON.stringify(profile.features, null, 2)],
      ];
      el().innerHTML = `
        <p>Authentifié ✓ — claims extraits du JWT par <code>ioserver-oidc</code> :</p>
        <table>
          <thead><tr><th>Claim</th><th>Valeur</th></tr></thead>
          <tbody>
            ${rows.map(([k, v]) =>
              `<tr><td>${escHtml(k)}</td><td><pre>${escHtml(v)}</pre></td></tr>`
            ).join('')}
          </tbody>
        </table>
        <div class="actions">
          <button class="btn-secondary" id="btnLogout">Se déconnecter</button>
        </div>
      `;
      document.getElementById('btnLogout').addEventListener('click', logout);
    }

    function showStatus(msg) {
      el().innerHTML = `<p class="status">${escHtml(msg)}</p>`;
    }

    // ── Boucle principale ──────────────────────────────────────────────────
    async function render() {
      const params = new URLSearchParams(window.location.search);
      const code  = params.get('code');
      const state = params.get('state');

      // Retour OAuth — échange du code
      if (code && state) {
        showStatus('Échange du code OAuth en cours…');
        try {
          const token   = await exchangeCode(code, state);
          history.replaceState({}, '', window.location.pathname);
          const profile = await fetchProfile(token);
          showProfile(profile);
        } catch (e) {
          showLogin(e.message);
        }
        return;
      }

      // Token déjà présent en session
      const token = sessionStorage.getItem('access_token');
      if (token) {
        showStatus('Chargement du profil…');
        try {
          const profile = await fetchProfile(token);
          showProfile(profile);
        } catch {
          sessionStorage.removeItem('access_token');
          showLogin('Session expirée — veuillez vous reconnecter.');
        }
        return;
      }

      showLogin();
    }

    render();
  </script>
</body>
</html>
