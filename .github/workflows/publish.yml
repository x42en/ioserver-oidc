# ──────────────────────────────────────────────────────────────
# ioserver-oidc — Package release
#
# Triggers when a GitHub Release is published.
# Builds the TypeScript package and publishes to npmjs.
#
# Current auth: NPM_TOKEN secret (Settings → Secrets → Actions)
# TODO: once the first publication is done, switch to trusted
#       publisher by uncommenting id-token and the provenance step.
# ──────────────────────────────────────────────────────────────

name: Release package

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  # id-token: write  # Uncomment to enable OIDC trusted publisher

env:
  PNPM_VERSION: '9'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # ── Token-based publish — remove once trusted publisher is active ──
      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Trusted publisher — uncomment after first publication ──────────
      # - name: Publish to npm
      #   run: NODE_AUTH_TOKEN="" npm publish --access public --provenance --ignore-scripts

  publish-gpr:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (GitHub Packages)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@x42en'

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Prepare package for GitHub Packages
        run: node scripts/gpr.js

      - name: Publish to GitHub Packages
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore package configuration
        if: always()
        run: node scripts/gpr-restore.js
