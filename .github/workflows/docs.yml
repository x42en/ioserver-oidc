# ──────────────────────────────────────────────────────────────
# ioserver-oidc — Documentation deployment
#
# Builds the docs-site Docker image and pushes it to GHCR on
# every push to main. The image is then picked up by the
# docs.circle-cyber.com compose stack.
# ──────────────────────────────────────────────────────────────

name: Deploy Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./docs-site
          file: ./docs-site/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ioserver-oidc-docs:latest
            ghcr.io/${{ github.repository_owner }}/ioserver-oidc-docs:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NUXT_APP_BASE_URL=/ioserver-oidc/
            NUXT_SITE_URL=https://docs.circle-cyber.com/ioserver-oidc
