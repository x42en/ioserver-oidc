# ──────────────────────────────────────────────────────────────
# ioserver-oidc — Package release
#
# Triggers when a version tag (v*) is pushed.
# Builds the TypeScript package and publishes to npmjs.
#
# Required secrets:
#   NPM_TOKEN — npmjs.com automation token (Settings → Secrets → Actions)
# ──────────────────────────────────────────────────────────────

name: Release package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    name: Build & publish to npm
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node + pnpm ─────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # ── Install ──────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build ────────────────────────────────────────────────
      - name: Build
        run: pnpm run build

      # ── Bump version from tag ────────────────────────────────
      - name: Set package version from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          pnpm version "$TAG" --no-git-tag-version

      # ── Publish ──────────────────────────────────────────────
      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Create GitHub Release ────────────────────────────────
      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --title "Release ${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
